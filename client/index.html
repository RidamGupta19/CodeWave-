<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="description" content="CodeWave Solution - Premium coaching institute management system and career development platform for engineering students." />
    <title>CodeWave Solution | Premium Coaching & Career Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-family:monospace;width:100%;">' + 
          '<h3>React Error:</h3><p>' + e.message + '</p><p>' + e.filename + ':' + e.lineno + '</p></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="position:fixed;bottom:0;left:0;z-index:9999;background:darkred;color:white;padding:20px;font-family:monospace;width:100%;">' + 
          '<h3>Promise Error:</h3><p>' + (e.reason ? (e.reason.message || e.reason) : 'Unknown') + '</p></div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
